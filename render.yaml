services:
  - type: web
    name: meal-plan-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false        # set this manually in the Render dashboard
      - key: JWT_SECRET
        sync: false        # set this manually in the Render dashboard
      - key: FRONTEND_URL
        sync: false        # e.g. https://meal-plan-project.vercel.app
